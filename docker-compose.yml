version: "3.8"

services:
  backend:
    build: ./backend
    container_name: openbid-backend
    ports:
      - "3005:3005"

  frontend:
    build: ./frontend
    container_name: openbid-frontend
    ports:
      - "5173:5173"
    # Essential for hot reloading: maps local changes instantly into the container
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps Docker detect file changes on Windows/macOS
    depends_on:
      - backend
